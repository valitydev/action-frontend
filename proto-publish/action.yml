name: "Publish Proto Library to NPM"
description: "Publish Proto files to NPM"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
    - uses: valitydev/action-setup-thrift@v1
    - uses: actions/setup-node@v6
    - name: Install dependencies
      shell: bash
      run: npm install
    - name: Build
      shell: bash
      run: npm run codegen
    - name: Publish
      uses: valitydev/action-frontend/publish@v2
